<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe - Alignement</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for some themes -->
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, query, where, addDoc, getDocs, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        window.firebase = {
            initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged,
            getFirestore, doc, getDoc, setDoc, onSnapshot, collection, query, where, addDoc, getDocs, updateDoc, deleteDoc, serverTimestamp
        };
    </script>
</head>
<body class="theme-retro">
    <header>Jeu de Morpion - Alignement</header>

    <div id="score-counter">
        <div id="score-x">Joueur X: 0</div>
        <div id="score-o">Joueur O: 0</div>
        <div id="score-draws">Nuls: 0</div>
    </div>

    <div id="game-settings">
        <label for="board-size-input">Taille du plateau (3-20):</label>
        <input type="number" id="board-size-input" value="13" min="3" max="20">
        <label for="win-condition-input">Aligner pour gagner (3-Taille):</label>
        <input type="number" id="win-condition-input" value="6" min="3">
    </div>

    <div id="game-controls">
        <select id="theme-selector" aria-label="Choisir un thème">
            <option value="theme-retro" selected>Rétro</option>
            <option value="theme-punk">Punk</option>
            <option value="theme-matrix">Matrix</option>
            <option value="theme-gemini">Gemini</option>
            <option value="theme-ocean">Océan</option>
            <option value="theme-sunset">Coucher de Soleil</option>
            <option value="theme-forest">Forêt</option>
            <option value="theme-neon">Néon</option>
            <option value="theme-classique">Classique</option>
            <option value="theme-space1">Espace Profond</option>
            <option value="theme-space2">Nébuleuse Galactique</option>
            <option value="theme-space3">Surface Martienne</option>
            <option value="theme-vintage-comic">Bande Dessinée Vintage</option>
            <option value="theme-cyberpunk">Cyberpunk</option>
            <option value="theme-chalkboard">Tableau Noir</option>
            <option value="theme-lava">Lave</option>
            <option value="theme-pixel-art">Pixel Art</option>
            <option value="theme-rpg-fantasy">RPG Fantasy</option>
        </select>

        <select id="ai-level-selector" aria-label="Choisir le niveau de l'IA">
            <option value="minimax" selected>IA (Minimax)</option>
            <option value="human">Joueur vs Joueur (Local)</option>
        </select>

        <button id="reset-button" role="button" aria-label="Recommencer la partie">Recommencer</button>
        <button id="undo-button" role="button" aria-label="Annuler le dernier coup">Annuler</button>
        <button id="hint-button" role="button" aria-label="Obtenir un indice">Indice</button>
    </div>

    <div id="online-controls">
        <button id="create-game-button">Créer une partie en ligne</button>
        <input type="text" id="game-id-input" placeholder="ID de la partie à rejoindre" aria-label="ID de la partie à rejoindre">
        <button id="join-game-button">Rejoindre la partie</button>
        <button id="leave-game-button" style="display:none;">Quitter la partie</button>
        <div id="user-id-display">Votre ID: Non connecté</div>
        <div id="game-id-display">ID de la partie: Aucune</div>
        <div id="player-roles-display"></div>
    </div>

    <div id="game-status" aria-live="polite"></div>

    <div id="game-board-container">
        <div id="game-board" role="grid" aria-label="Plateau de jeu morpion"></div>
        <svg id="winning-line-svg"></svg>
    </div>

    <!-- Custom Modal for game messages -->
    <div id="game-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <button id="modal-close-button">OK</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
